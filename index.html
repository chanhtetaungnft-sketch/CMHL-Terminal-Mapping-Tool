function cleanRow(row){
    const obj = {};
    Object.keys(row).forEach(k=>{
        obj[k.trim()] = row[k];
    });
    return obj;
}

function processFile(){

    const file = document.getElementById("upload").files[0];
    const status = document.getElementById("status");

    if(!file){
        alert("Upload file first!");
        return;
    }

    status.innerText="⏳ Processing...";

    const reader = new FileReader();

    reader.onload = function(e){

        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data,{type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];

        let json = XLSX.utils.sheet_to_json(ws).map(cleanRow);

        const headers = Object.keys(json[0]);

        // detect columns
        const tidCol = headers.find(h=>h.toLowerCase().includes("terminal"));
        const dateCol = headers.find(h=>h.toLowerCase().includes("date"));
        const timeCol = headers.find(h=>h.toLowerCase().includes("time"));

        if(!tidCol){
            alert("Terminal ID column not found!");
            return;
        }

        const result = json
        .filter(r=>{
            const tid = String(r[tidCol]).trim();
            return mapping[tid];
        })
        .map(r=>{

            const tid = String(r[tidCol]).trim();
            const mapData = mapping[tid];

            return {      
                "Transaction Date": r[dateCol] || "",
                "Transaction Time": r[timeCol] || "",

                "Transaction Status": r["Transaction Status"] || "",
                "Business Name": r["Business Name"] || "",

                "Merchant ID": mapData.mid,
                "Store ID": mapData.store,
                "Terminal ID": tid,

                "Transaction Amount": r["Transaction Amount"] || "",
                "Card Brand": r["Card Brand"] || "",

                "On-Us MDR": r["On-Us MDR"] || "",
                "Off-Us MDR": r["Off-Us MDR"] || "",

                "MDR Amount": r["MDR Amount"] || "",
                "Net Settled Amount": r["Net Settled Amount"] || "",

                "Card Number": r["Card Number"] || "",
                "Approval Code": r["Approval Code"] || ""
            };
        });

        status.innerText=`✅ ${result.length} rows exported`;

        const ws2 = XLSX.utils.json_to_sheet(result);
        const wb2 = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb2, ws2, "Result");

        XLSX.writeFile(wb2,"CMHL_Mapping_Final_Result.xlsx");
    };

    reader.readAsArrayBuffer(file);
}
